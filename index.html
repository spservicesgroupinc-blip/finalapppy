
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0F172A" />
    <meta name="description" content="RFE Foam Pro - Enterprise Estimation &amp; Rig Management" />

    <!-- PWA / iOS meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RFE Foam Pro" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="RFE Foam Pro" />
    <meta name="msapplication-TileColor" content="#E30613" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="RFE Foam Pro" />
    <meta property="og:description" content="Enterprise Spray Foam Estimation &amp; Rig Management Suite" />
    <meta property="og:image" content="/icon.svg" />

    <title>RFE Foam Pro</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.svg" />

    <!-- iOS Splash Screens -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" href="/icon.svg" />
    <link rel="apple-touch-startup-image" media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" href="/icon.svg" />
    <link rel="apple-touch-startup-image" media="screen and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" href="/icon.svg" />
    <link rel="apple-touch-startup-image" media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)" href="/icon.svg" />

    <style>
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: #f1f5f9; }
      ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #64748b; }

      body {
        overscroll-behavior-y: none;
        -webkit-tap-highlight-color: transparent;
        background-color: #f8fafc;
        user-select: none;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
      input, textarea, [contenteditable] { user-select: text; }

      @media (display-mode: standalone) {
        body { padding-top: env(titlebar-area-height, 0px); }
        .title-bar-draggable {
          position: fixed;
          top: 0; left: 0;
          width: 100%;
          height: env(titlebar-area-height, 30px);
          z-index: 9999;
          -webkit-app-region: drag;
          app-region: drag;
          display: flex;
          align-items: center;
          background: #0F172A;
        }
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 pb-20 md:pb-0">
    <!-- Desktop PWA Title Bar -->
    <div class="title-bar-draggable hidden md:block"></div>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
